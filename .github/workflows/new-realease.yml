name: Create Release with Auto-Incremented Version

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes'
        required: false
        default: 'New release'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Get latest tag and increment version
        id: get_version
        run: |
          # Fetch all tags
          git fetch --tags
          
          # Get the latest tag (format v1.0.0 or similar)
          latest_tag=$(git tag -l 'v*' | sort -V | tail -n 1)
          
          # If no tags exist, start with v1.0.0
          if [ -z "$latest_tag" ]; then
            new_version="v1.0.0"
            echo "No previous tags found. Starting with $new_version"
          else
            echo "Latest tag: $latest_tag"
            
            # Extract version numbers
            version_numbers=$(echo $latest_tag | sed 's/v//')
            major=$(echo $version_numbers | cut -d. -f1)
            minor=$(echo $version_numbers | cut -d. -f2)
            patch=$(echo $version_numbers | cut -d. -f3)
            
            # Increment patch version
            new_patch=$((patch + 1))
            new_version="v$major.$minor.$new_patch"
            echo "Incremented version: $new_version"
          fi
          
          # Set output variables
          echo "new_version=$new_version" >> $GITHUB_OUTPUT
          echo "release_name=Release $new_version" >> $GITHUB_OUTPUT
      
      - name: Create Zip File
        run: |
          # Exclude .git directory and GitHub workflows
          zip -r release.zip . -x "*.git*" ".github/workflows/*"
      
      - name: Create Tag
        run: |
          git tag ${{ steps.get_version.outputs.new_version }}
          git push origin ${{ steps.get_version.outputs.new_version }}
      
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.new_version }}
          name: ${{ steps.get_version.outputs.release_name }}
          body: ${{ github.event.inputs.release_notes }}
          draft: false
          prerelease: false
          files: release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}